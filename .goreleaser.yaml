version: 2

project_name: baton

before:
  hooks:
    - go mod tidy

builds:
  - id: baton
    main: .
    binary: baton
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/devenjarvis/baton/cmd.Version={{.Version}}
      - -X github.com/devenjarvis/baton/cmd.Commit={{.Commit}}
      - -X github.com/devenjarvis/baton/cmd.Date={{.Date}}

archives:
  - id: baton
    name_template: "baton_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: Tests
      regexp: '^.*?test(\(.+\))??!?:.+$'
      order: 3
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - '^style:'
      - 'Merge pull request'
      - 'Merge remote-tracking branch'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

# Homebrew publishing. Requires:
#   1) A public repo at github.com/devenjarvis/homebrew-tap
#   2) A PAT with `contents: write` on that repo, stored as the
#      HOMEBREW_TAP_GITHUB_TOKEN secret on this repo's Actions settings.
# skip_upload: auto keeps snapshots and pre-releases from touching the tap.
brews:
  - name: baton
    repository:
      owner: devenjarvis
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/devenjarvis/baton
    description: Terminal-native orchestrator for parallel Claude Code agents
    license: MIT
    skip_upload: auto
    test: |
      system "#{bin}/baton", "--version"
    install: |
      bin.install "baton"
    dependencies:
      - name: git
