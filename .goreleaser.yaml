version: 2

project_name: baton

before:
  hooks:
    - go mod tidy

builds:
  - id: baton
    main: .
    binary: baton
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/devenjarvis/baton/cmd.Version={{.Version}}
      - -X github.com/devenjarvis/baton/cmd.Commit={{.Commit}}
      - -X github.com/devenjarvis/baton/cmd.Date={{.Date}}

archives:
  - id: baton
    name_template: "baton_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: Tests
      regexp: '^.*?test(\(.+\))??!?:.+$'
      order: 3
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - '^style:'
      - 'Merge pull request'
      - 'Merge remote-tracking branch'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

