name: Mutation

on:
  pull_request:
    branches: [main]

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  mutation:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PACKAGES: >-
        internal/config
        internal/editor
        internal/git
        internal/hook
        internal/agent
        internal/state
        internal/github
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure git for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test.com"

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest

      - name: Run gremlins per package
        id: gremlins
        run: |
          set +e
          mkdir -p reports
          for pkg in $PACKAGES; do
            slug="${pkg//\//_}"
            echo "::group::gremlins unleash ./$pkg"
            gremlins unleash \
              --timeout-coefficient 4 \
              -o "reports/${slug}.json" \
              "./$pkg" > "reports/${slug}.txt" 2>&1
            status=$?
            echo "exit=$status" >> "reports/${slug}.txt"
            echo "::endgroup::"
          done

      - name: Build summary
        run: |
          {
            echo "# Mutation testing baseline"
            echo
            echo "| Package | Test efficacy | Mutator coverage | Killed | Lived | Not covered | Timed out | Not viable |"
            echo "| --- | --- | --- | --- | --- | --- | --- | --- |"
          } > reports/summary.md
          for pkg in $PACKAGES; do
            slug="${pkg//\//_}"
            json="reports/${slug}.json"
            if [ ! -s "$json" ]; then
              echo "| \`$pkg\` | n/a | n/a | 0 | 0 | 0 | 0 | 0 |" >> reports/summary.md
              continue
            fi
            counts=$(jq -r '
              [.files[]?.mutations[]?.status] as $s
              | {
                  killed: ($s | map(select(. == "KILLED")) | length),
                  lived: ($s | map(select(. == "LIVED")) | length),
                  notcov: ($s | map(select(. == "NOT COVERED")) | length),
                  timeout: ($s | map(select(. == "TIMED OUT")) | length),
                  notvia: ($s | map(select(. == "NOT VIABLE")) | length)
                }
              | "\(.killed) \(.lived) \(.notcov) \(.timeout) \(.notvia)"
            ' "$json")
            read killed lived notcov timeout notvia <<< "$counts"
            covered=$(( killed + lived ))
            total=$(( covered + notcov + notvia + timeout ))
            if [ "$covered" -gt 0 ]; then
              efficacy=$(awk -v k="$killed" -v c="$covered" 'BEGIN { printf "%.2f%%", (k/c)*100 }')
            else
              efficacy="n/a"
            fi
            if [ "$total" -gt 0 ]; then
              mcov=$(awk -v c="$covered" -v t="$total" 'BEGIN { printf "%.2f%%", (c/t)*100 }')
            else
              mcov="n/a"
            fi
            echo "| \`$pkg\` | $efficacy | $mcov | $killed | $lived | $notcov | $timeout | $notvia |" >> reports/summary.md
          done
          {
            echo
            echo "Per-package reports are attached as the \`gremlins-reports\` workflow artifact."
            echo
            echo "This job is **non-blocking** while we establish a baseline. See \`.gremlins.yaml\` and the follow-up issue for how thresholds will be tuned and gated."
          } >> reports/summary.md
          cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: gremlins-reports
          path: reports/
          retention-days: 14

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: gremlins
          path: reports/summary.md
